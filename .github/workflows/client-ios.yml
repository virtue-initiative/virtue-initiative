name: Client iOS Checks

permissions:
  contents: write

on:
  pull_request:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  client-ios:
    name: Client iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            client -> target
            client/ios/rust -> target

      - name: Rust build smoke test (core)
        run: cargo build -p virtue-client-core
        working-directory: client

      - name: Rust build smoke test (iOS bridge)
        run: cargo build --manifest-path Cargo.toml
        working-directory: client/ios/rust

      - name: Resolve version info
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        shell: bash
        run: |
          source ./scripts/version.sh
          echo "release_tag=$(virtue_release_tag)" >> "$GITHUB_OUTPUT"
          echo "build_label=$(virtue_build_label)" >> "$GITHUB_OUTPUT"
        working-directory: client

      - name: iOS app build smoke test (simulator)
        run: ./scripts/build-ios.sh --destination "generic/platform=iOS Simulator" --derived-data .derived-data-ci-ios
        working-directory: client/ios

      - name: Build iOS app bundle (release, unsigned)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./scripts/build-ios.sh --destination "generic/platform=iOS" --configuration Release --derived-data .derived-data-ci-ios-release --code-signing-allowed NO
        working-directory: client/ios

      - name: Package iOS app bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          mkdir -p dist
          app_path=".derived-data-ci-ios-release/Build/Products/Release-iphoneos/VirtueIOS.app"
          if [[ ! -d "${app_path}" ]]; then
            echo "Built iOS app bundle not found: ${app_path}" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "dist/VirtueIOS-${{ steps.version.outputs.build_label }}.zip"
        working-directory: client/ios

      - name: Upload iOS app bundle artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: virtue-ios-${{ steps.version.outputs.build_label }}
          path: client/ios/dist/VirtueIOS-${{ steps.version.outputs.build_label }}.zip

      - name: Clear existing iOS prerelease assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: ../scripts/clear-prerelease-assets.sh "${{ steps.version.outputs.release_tag }}" "VirtueIOS-*.zip"
        working-directory: client/ios

      - name: Publish iOS prerelease asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: ../scripts/publish-prerelease.sh "${{ steps.version.outputs.release_tag }}" "${{ steps.version.outputs.build_label }}" "dist/VirtueIOS-${{ steps.version.outputs.build_label }}.zip"
        working-directory: client/ios
