name: Client Android Checks

permissions:
  contents: write

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  client-android:
    name: Client Android
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            client/android/rust -> target

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK tools
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}
            ~/.android
          key: ${{ runner.os }}-android-sdk-35-26.1.10909125-v1

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.1.10909125"

      - name: Pin Android NDK path
        run: |
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk >/dev/null 2>&1; then
            cargo install cargo-ndk --locked
          fi

      - name: Resolve version info
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        shell: bash
        run: |
          source ./scripts/version.sh
          echo "release_tag=$(virtue_release_tag)" >> "$GITHUB_OUTPUT"
          echo "build_label=$(virtue_build_label)" >> "$GITHUB_OUTPUT"
        working-directory: client

      - name: Android lint + build (debug)
        run: ./gradlew --no-daemon :app:lintDebug :app:assembleDebug
        working-directory: client/android

      - name: Android build (release)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew --no-daemon :app:assembleRelease
        working-directory: client/android

      - name: Package Android artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          mkdir -p dist
          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n1)"
          if [[ -z "${apk_path}" ]]; then
            echo "Release APK not found" >&2
            exit 1
          fi
          cp "${apk_path}" "dist/virtue-android-${{ steps.version.outputs.build_label }}.apk"
        working-directory: client/android

      - name: Upload Android artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: virtue-android-${{ steps.version.outputs.build_label }}
          path: client/android/dist/virtue-android-${{ steps.version.outputs.build_label }}.apk

      - name: Publish Android prerelease asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: ../scripts/publish-prerelease.sh "${{ steps.version.outputs.release_tag }}" "${{ steps.version.outputs.build_label }}" "dist/virtue-android-${{ steps.version.outputs.build_label }}.apk"
        working-directory: client/android
