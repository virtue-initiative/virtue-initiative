name: Client Linux Checks

permissions:
  contents: write

on:
  pull_request:
  push:
    branches:
      - fix-deploy
  workflow_dispatch:

jobs:
  client-linux:
    name: Client Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            client -> target

      - name: Rust format check (workspace)
        run: cargo fmt --all -- --check
        working-directory: client

      - name: Rust lint (core)
        run: cargo clippy -p virtue-client-core --all-targets -- -D warnings
        working-directory: client

      - name: Rust lint (Linux client)
        run: cargo clippy -p virtue-linux-client --all-targets -- -D warnings
        working-directory: client

      - name: Rust tests (core)
        run: cargo test -p virtue-client-core
        working-directory: client

      - name: Rust tests (Linux client)
        run: cargo test -p virtue-linux-client
        working-directory: client

      - name: Build Linux .deb package
        run: ./linux/scripts/build-deb.sh
        working-directory: client

      - name: Resolve version info
        if: github.event_name == 'push' && github.ref == 'refs/heads/fix-deploy'
        id: version
        shell: bash
        run: |
          source ./scripts/version.sh
          echo "release_tag=$(virtue_release_tag)" >> "$GITHUB_OUTPUT"
          echo "build_label=$(virtue_build_label)" >> "$GITHUB_OUTPUT"
          echo "arch=$(dpkg --print-architecture)" >> "$GITHUB_OUTPUT"
        working-directory: client

      - name: Upload Linux installer artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/fix-deploy'
        uses: actions/upload-artifact@v4
        with:
          name: virtue-linux-${{ steps.version.outputs.build_label }}
          path: client/target/debian/virtue_${{ steps.version.outputs.build_label }}_${{ steps.version.outputs.arch }}.deb

      - name: Publish Linux prerelease asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/fix-deploy'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/publish-prerelease.sh "${{ steps.version.outputs.release_tag }}" "${{ steps.version.outputs.build_label }}" "target/debian/virtue_${{ steps.version.outputs.build_label }}_${{ steps.version.outputs.arch }}.deb"
        working-directory: client
