name: Lint

on:
  pull_request:
  workflow_dispatch:

jobs:
  ts-and-prettier:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            client -> target

      - name: Rust format check (workspace)
        run: cargo fmt --all -- --check
        working-directory: client

      - name: Rust lint (core)
        run: cargo clippy -p virtue-client-core --all-targets -- -D warnings
        working-directory: client

      - name: Rust lint (Linux client)
        run: cargo clippy -p virtue-linux-client --all-targets -- -D warnings
        working-directory: client

      # Linux-runnable Rust tests only.
      # mac/windows/android-rust are excluded from this Ubuntu job.
      - name: Rust tests (core)
        run: cargo test -p virtue-client-core
        working-directory: client

      - name: Rust tests (Linux client)
        run: cargo test -p virtue-linux-client
        working-directory: client

      - name: Rust format check (Android)
        run: cargo fmt --all --manifest-path android/rust/Cargo.toml -- --check
        working-directory: client

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            api/package-lock.json
            web/package-lock.json
            help/package-lock.json

      - name: Install API dependencies
        run: npm ci
        working-directory: api

      - name: Install Web dependencies
        run: npm ci
        working-directory: web

      - name: Install Help dependencies
        run: npm ci
        working-directory: help

      - name: API type check
        run: npm run typecheck
        working-directory: api

      - name: API tests
        run: npm test
        working-directory: api

      - name: Web type check
        run: npm run typecheck
        working-directory: web

      - name: Help type check
        run: npm run typecheck
        working-directory: help

      - name: API Prettier check
        run: npm run prettier:check
        working-directory: api

      - name: Web Prettier check
        run: npm run prettier:check
        working-directory: web

      - name: Help Prettier check
        run: npm run prettier:check
        working-directory: help
