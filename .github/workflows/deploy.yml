name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, deploy-on-push]

jobs:
  deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [web, api, help, landing]

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - run: npm ci
      - run: npm run build

      - run: env | grep CLOUDFLARE
      - run: echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} ACCOUNT_ID=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.project }}
          command: deploy
