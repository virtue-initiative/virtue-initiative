name = "virtueinitiative-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Development settings
[dev]
port = 8787

# Database binding (D1)
[[d1_databases]]
binding = "DB"
database_name = "virtueinitiative-db"
database_id = "ff636ee0-a8f9-44a1-8a16-f0a162cf1c73"
migrations_dir = "src/schema/migrations"

# R2 bucket binding (native Workers binding)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "virtueinitiative-images"

# Environment variables (use wrangler secret for sensitive values in production)
[vars]
JWT_ACCESS_EXPIRY = "15m"
JWT_REFRESH_EXPIRY = "7d"
CORS_ORIGIN = "https://app.virtueinitiative.org"
R2_URL = "https://r2.virtueinitiative.org"
