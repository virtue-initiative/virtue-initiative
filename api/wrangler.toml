name = "bepure-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Development settings
[dev]
port = 8787

# Database binding (D1)
[[d1_databases]]
binding = "DB"
database_name = "bepure-db"
database_id = "5fe6ffce-be10-4f89-914a-b995a7ff07ec"
migrations_dir = "src/schema/migrations"

# R2 bucket binding (native Workers binding)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "bepure-images"

# Environment variables (use wrangler secret for sensitive values in production)
[vars]
JWT_ACCESS_EXPIRY = "15m"
JWT_REFRESH_EXPIRY = "7d"
CORS_ORIGIN = "https://app.bepure.anb.codes"
